<svg xmlns="http://www.w3.org/2000/svg" width="1900" height="1080" viewBox="0 0 1900 1080" role="img" aria-labelledby="title desc">
  <title id="title">Depandency graph</title>
  <desc id="desc">Static dependency graph showing the main theorem, its bridge lemmas, and the core algebraic ingredients used in the Lean proof.</desc>
  <defs>
    <style>
      .bg { fill: #f8fafc; }
      .title { font: 700 28px sans-serif; fill: #0f172a; }
      .subtitle { font: 16px sans-serif; fill: #475569; }
      .edge { stroke: #64748b; stroke-width: 2.5; fill: none; stroke-linecap: round; stroke-linejoin: round; marker-end: url(#arrow); }
      .node { stroke-width: 2.5; rx: 18; ry: 18; }
      .top { fill: #dbeafe; stroke: #2563eb; }
      .bridge { fill: #ffedd5; stroke: #ea580c; }
      .algebra { fill: #dcfce7; stroke: #16a34a; }
      .core { fill: #f3e8ff; stroke: #9333ea; }
      .aux { fill: #e2e8f0; stroke: #475569; }
      .nodeTitle { font: 700 18px sans-serif; fill: #0f172a; text-anchor: middle; }
      .nodeFile { font: 14px sans-serif; fill: #475569; text-anchor: middle; }
      .legendText { font: 14px sans-serif; fill: #334155; }
    </style>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="7.2" refY="4" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 8 4 L 0 8 z" fill="#64748b"/>
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1900" height="1080"/>

  <text class="title" x="80" y="40">Depandency graph</text>
  <text class="subtitle" x="80" y="68">Arrows indicate immediate proof dependencies. Read the graph from the bottom up.</text>

  <g transform="translate(1480,22)">
    <rect class="node top" x="0" y="0" width="24" height="18"/>
    <text class="legendText" x="34" y="14">Top-level theorem</text>
    <rect class="node bridge" x="0" y="30" width="24" height="18"/>
    <text class="legendText" x="34" y="44">Bridge / certificate step</text>
    <rect class="node algebra" x="0" y="60" width="24" height="18"/>
    <text class="legendText" x="34" y="74">Algebra / SOS input</text>
    <rect class="node core" x="0" y="90" width="24" height="18"/>
    <text class="legendText" x="34" y="104">Normalization / core factorization</text>
  </g>

  <path class="edge" d="M 950 98 V 124 H 400 V 150"/>
  <path class="edge" d="M 950 98 V 124 H 1340 V 150"/>

  <path class="edge" d="M 400 224 V 262 H 170 V 300"/>
  <path class="edge" d="M 400 224 V 262 H 490 V 300"/>
  <path class="edge" d="M 400 224 V 262 H 820 V 300"/>
  <path class="edge" d="M 400 224 V 262 H 490 V 430"/>

  <path class="edge" d="M 1340 224 V 262 H 1190 V 300"/>
  <path class="edge" d="M 1340 224 V 262 H 1595 V 300"/>

  <path class="edge" d="M 820 374 V 430"/>
  <path class="edge" d="M 820 504 V 560"/>
  <path class="edge" d="M 820 634 V 690"/>
  <path class="edge" d="M 820 764 V 792 H 560 V 820"/>
  <path class="edge" d="M 820 764 V 792 H 940 V 820"/>
  <path class="edge" d="M 560 894 V 922 H 340 V 950"/>
  <path class="edge" d="M 560 894 V 922 H 680 V 950"/>
  <path class="edge" d="M 940 894 V 922 H 1020 V 950"/>

  <path class="edge" d="M 1595 374 V 430"/>
  <path class="edge" d="M 1595 504 V 532 H 1395 V 560"/>
  <path class="edge" d="M 1595 504 V 532 H 1710 V 560"/>
  <path class="edge" d="M 1395 634 V 690"/>

  <g transform="translate(740,24)">
    <rect class="node top" x="0" y="0" width="420" height="74"/>
    <text class="nodeTitle" x="210" y="29">rankTwo_no_spurious_socp</text>
    <text class="nodeFile" x="210" y="52">RankTwoMain.lean</text>
  </g>

  <g transform="translate(220,150)">
