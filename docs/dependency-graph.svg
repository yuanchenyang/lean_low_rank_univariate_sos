    <text class="nodeTitle" x="160" y="29">factor_peeling_certificate_step</text>
    <text class="nodeFile" x="160" y="52">RankTwoMain.lean</text>
  </g>

  <g transform="translate(340,430)">
    <rect class="node algebra" x="0" y="0" width="300" height="74"/>
    <text class="nodeTitle" x="150" y="29">hgroup_affine</text>
    <text class="nodeFile" x="150" y="52">UnivariateSOS.lean</text>
  </g>

  <g transform="translate(660,430)">
    <rect class="node bridge" x="0" y="0" width="320" height="74"/>
    <text class="nodeTitle" x="160" y="29">factor_peeling_image_orthogonal</text>
    <text class="nodeFile" x="160" y="52">UnivariateAlgebra.lean</text>
  </g>

  <g transform="translate(660,560)">
    <rect class="node bridge" x="0" y="0" width="320" height="74"/>
    <text class="nodeTitle" x="160" y="29">factor_peeling_path</text>
    <text class="nodeFile" x="160" y="52">UnivariateAlgebra.lean</text>
  </g>

  <g transform="translate(660,690)">
    <rect class="node bridge" x="0" y="0" width="320" height="74"/>
    <text class="nodeTitle" x="160" y="29">factor_peeling_schedule</text>
    <text class="nodeFile" x="160" y="52">UnivariateAlgebra.lean</text>
  </g>

  <g transform="translate(400,820)">
    <rect class="node algebra" x="0" y="0" width="320" height="74"/>
    <text class="nodeTitle" x="160" y="29">factor_peeling_decomposition</text>
    <text class="nodeFile" x="160" y="52">UnivariateAlgebra.lean</text>
  </g>

  <g transform="translate(780,820)">
    <rect class="node bridge" x="0" y="0" width="320" height="74"/>
    <text class="nodeTitle" x="160" y="29">factor_peeling_one_step</text>
    <text class="nodeFile" x="160" y="52">UnivariateAlgebra.lean</text>
  </g>

  <g transform="translate(180,950)">
    <rect class="node core" x="0" y="0" width="320" height="74"/>
    <text class="nodeTitle" x="160" y="29">gcd_sigma_decomposition</text>
    <text class="nodeFile" x="160" y="52">UnivariateAlgebraCore.lean</text>
  </g>

  <g transform="translate(520,950)">
    <rect class="node core" x="0" y="0" width="320" height="74"/>
    <text class="nodeTitle" x="160" y="29">no_real_roots_sigma_reduced</text>
    <text class="nodeFile" x="160" y="52">UnivariateAlgebraCore.lean</text>
  </g>

  <g transform="translate(860,950)">
    <rect class="node algebra" x="0" y="0" width="320" height="74"/>
    <text class="nodeTitle" x="160" y="29">hasPeelingWitness_of_factor_step</text>
    <text class="nodeFile" x="160" y="52">PeelingStep.lean</text>
  </g>

  <g transform="translate(1040,300)">
    <rect class="node bridge" x="0" y="0" width="300" height="74"/>
    <text class="nodeTitle" x="150" y="29">transformed_image_plus_cone</text>
    <text class="nodeFile" x="150" y="52">FactoredCase.lean</text>
