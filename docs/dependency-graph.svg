    <text class="nodeTitle" x="175" y="29">factored_h1_decomposition_to_original</text>
    <text class="nodeFile" x="175" y="52">FactoredCase.lean</text>
  </g>

  <g transform="translate(1420,430)">
    <rect class="node bridge" x="0" y="0" width="350" height="74"/>
    <text class="nodeTitle" x="175" y="29">inImagePlusSigmaKerCone_of_h1_data</text>
    <text class="nodeFile" x="175" y="52">H1Case.lean</text>
  </g>

  <g transform="translate(1230,560)">
    <rect class="node algebra" x="0" y="0" width="330" height="74"/>
    <text class="nodeTitle" x="165" y="29">inImageA_mul_of_isCoprime</text>
    <text class="nodeFile" x="165" y="52">H1Case.lean</text>
  </g>

  <g transform="translate(1580,560)">
    <rect class="node algebra" x="0" y="0" width="260" height="74"/>
    <text class="nodeTitle" x="130" y="29">inSigmaKerCone</text>
    <text class="nodeFile" x="130" y="52">H1Case.lean</text>
